name: Build and Push Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  schedule:
    # Rebuild every Monday at 04:00 UTC to pick up base-image & package updates
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  IMAGE_NAME: obsidian-blue
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # needed for cosign OIDC signing

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # .gitmodules selects Omadora's Fedora-current default branch. Advance
      # the checkout on every image build so scheduled rebuilds pick up fixes
      # without waiting for a separate gitlink bump in this repository.
      - name: Update Omadora to the tracked branch tip
        run: git submodule update --init --remote --checkout --depth 1 files/omadora

      - name: Validate Hyprland package request
        run: bash files/scripts/validate-hyprland-stack.sh --recipe recipes/recipe.yml

      - name: Build image
        id: build
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
