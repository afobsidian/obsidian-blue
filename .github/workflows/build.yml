name: Build and Push Image

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  schedule:
    # Rebuild every Monday at 04:00 UTC to pick up base-image & package updates
    - cron: "0 4 * * 1"
  workflow_dispatch:

env:
  IMAGE_NAME: obsidian-blue
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # needed for cosign OIDC signing

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      # Build the exact reviewed Omadora revision recorded by this repository.
      # Advancing to the remote branch tip here can silently replace the Lua
      # configuration with a Hyprlang revision and make scheduled builds differ
      # from builds made from the same obsidian-blue commit.
      - name: Check out pinned Omadora revision
        run: git submodule update --init --checkout --depth 1 files/omadora

      - name: Validate Hyprland Lua default
        run: |
          test "$(git -C files/omadora rev-parse HEAD)" = "$(git rev-parse HEAD:files/omadora)"
          test -f files/omadora/config/hypr/hyprland.lua
          test ! -e files/omadora/config/hypr/hyprland.conf
          bash -n files/usr/bin/starthyprland
          grep -Fq 'if [ -f "$hyprland_lua" ]; then' files/usr/bin/starthyprland

      - name: Validate Hyprland package request
        run: bash files/scripts/validate-hyprland-stack.sh --recipe recipes/recipe.yml

      - name: Build image
        id: build
        uses: blue-build/github-action@v1
        with:
          recipe: recipe.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
