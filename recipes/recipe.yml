# recipe.yml
# Based on: ghcr.io/wayblueorg/hyprland
# DX layer inspired by: ublue-os/bluefin-dx
#
# wayblue common base already provides (do NOT re-add):
#   rofi-wayland, wofi, fzf, wl-clipboard, pavucontrol, playerctl, pamixer,
#   distrobox, just, brightnessctl, blueman, slurp, grim, dunst,
#   thunar, thunar-archive-plugin, thunar-volman, xarchiver,
#   wireplumber, pipewire, pulseaudio-utils, network-manager-applet,
#   qt5-qtwayland, qt6-qtwayland, wlsunset, kanshi, wlr-randr, vim, ...
#
# wayblue hyprland image also provides (upgraded via sdegler/hyprland COPR):
#   hyprland, waybar, kitty, xdg-desktop-portal-hyprland,
#   hyprpaper, hyprlock, hypridle, hyprland-qtutils
#   (originally from solopasha/hyprland; that COPR is abandoned — we disable it
#    at build time and upgrade these packages from sdegler/hyprland instead)

name: obsidian-blue
description: >-
  Custom immutable Fedora Atomic image.
  wayblue hyprland base + bluefin-dx developer tooling
  + extra opinionated Hyprland ecosystem packages
  + KooL Hyprland-Dots dependencies.

# ─── Base image ────────────────────────────────────────────────────────────────
# Change to hyprland-nvidia / hyprland-nvidia-open if you have an Nvidia GPU.
base-image: ghcr.io/wayblueorg/hyprland-nvidia-open
image-version: latest # only supported tag

# ─── Build modules ─────────────────────────────────────────────────────────────
modules:
  # ── 1. Clear stale DNF cache entries; swap to sdegler/hyprland COPR ───────────
  - type: script
    scripts:
      - clear-rpmfusion-dnf-cache.sh
      - swap-hyprland-copr.sh

  # ── 2. RPM repos + installs ──────────────────────────────────────────────────
  - type: dnf
    repos:
      # Current BlueBuild expects repo files under dnf.repos rather than bling.
      cleanup: true
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
        - sdegler-hyprland.repo
        - vscode.repo
    install:
      install-weak-deps: false
      packages:
        # ── Core Hyprland packages (upgrade from sdegler/hyprland COPR) ──────
        # wayblue base installs these from the now-abandoned solopasha COPR;
        # listing them here ensures dnf upgrades them from sdegler.
        - hyprland
        - xdg-desktop-portal-hyprland
        - hyprpaper
        - hyprlock
        - hypridle
        - hyprland-qtutils

        # ── Extra Hyprland ecosystem (sdegler/hyprland COPR) ─────────────────
        - hyprland-plugins # official plugin set: border++, hyprexpo, hyprtrails, …
        - hyprpicker # colour picker
        - hyprshot # screenshot utility
        - hyprpolkitagent # polkit authentication agent
        # NOTE: wayblue ships wlsunset for blue-light; hyprsunset replaces it
        - hyprsunset
        - hyprland-contrib # community scripts: grimblast, etc.
        - satty # screenshot annotation tool

        # ── KooL Hyprland-Dots deps not already in wayblue common ────────────
        - swappy # screenshot editor (grim + slurp already in base)
        - cliphist # clipboard manager (wl-clipboard backend already in base)
        - SwayNotificationCenter # swaync; replaces dunst which wayblue ships
        - mpv # media player
        - nwg-look # GTK settings GUI
        - qt5ct
        - qt6ct
        - kvantum
        - wlogout # logout / power menu
        - ImageMagick # wallpaper manipulation scripts
        - tumbler # thumbnail service for Thunar (volman already in base)
        - yad # dialog boxes used by KooL scripts
        - yt-dlp # video downloader
        - imv # image viewer

        # ── Upstream-installed extras: runtime deps ─────────────────────────
        - python3-gobject # nwg-displays GTK bindings
        - python3-i3ipc # nwg-displays sway IPC integration
        - gtk-layer-shell # nwg-displays overlay support

        # ── Upstream-installed extras: build deps ───────────────────────────
        - python3-build # build nwg-displays wheel from source
        - python3-installer # install nwg-displays wheel into the image
        - python3-setuptools # nwg-displays packaging metadata
        - python3-wheel # nwg-displays wheel build backend
        - cargo # build wallust from upstream source
        - rust # build wallust from upstream source
        - gcc # linker for cargo builds

        # ── Bluefin DX: container runtimes ──────────────────────────────────
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin

        # ── Bluefin DX: IDE & Kubernetes tooling ────────────────────────────
        - code # VS Code from Microsoft repo
        - kubectl
        - helm

        # ── Bluefin DX: dev quality-of-life CLIs ────────────────────────────
        # (distrobox, fzf, just already in wayblue base)
        - gh # GitHub CLI
        - neovim
        - ripgrep
        - fd-find
        - jq
        - yq
        - zsh
        - fish

        # ── Bluefin DX: performance profiling (Brendan Gregg toolkit) ───────
        - perf
        - sysprof

    remove:
      packages:
        # wayblue ships wlsunset; hyprsunset is the Hyprland-native replacement
        - wlsunset
        # wayblue ships dunst; swaync is what KooL dots expect
        - dunst

  # ── 3. Enable systemd services ───────────────────────────────────────────────
  - type: systemd
    system:
      enabled:
        - docker.socket
        - docker.service
        - podman.socket
    user:
      enabled:
        - podman.socket

  # ── 4. Install upstream packages not shipped in enabled Fedora repos ───────
  - type: script
    scripts:
      - install-upstream-tools.sh

  # ── 5. Remove build-only deps used by upstream installers ──────────────────
  - type: dnf
    remove:
      packages:
        - python3-build
        - python3-installer
        - python3-setuptools
        - python3-wheel
        - cargo
        - rust
        - gcc

  # ── 6. Default Flatpaks (installed on first boot, not baked in) ──────────────
  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        repo:
          url: https://dl.flathub.org/repo/flathub.flatpakrepo
          name: flathub
        install:
          - com.github.wwmm.easyeffects
          - io.podman_desktop.PodmanDesktop
          - org.gnome.Boxes

          # ── 7. Signing ───────────────────────────────────────────────────────────────
  - type: signing
