# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

# obsidian-blue starts Hyprland directly, so provide the session anchor that
# UWSM would normally activate.
exec-once = sh -c 'systemctl --user cat obsidian-blue-session.target >/dev/null 2>&1 && systemctl --user start obsidian-blue-session.target || true'

# Start the omadora services
exec-once = systemctl --user start omadora-session.target

# Run post-boot hooks after startup config has loaded
exec-once = sleep 2 && omadora-hook post-boot
