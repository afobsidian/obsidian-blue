# Force SDDM as the display manager even for rebased systems whose mutable /etc
# still contains wayblue's old display-manager.service -> greetd.service link.
L+ /etc/systemd/system/display-manager.service - - - - /usr/lib/systemd/system/sddm.service
r /etc/systemd/system/multi-user.target.wants/greetd.service
d /etc/sddm.conf.d 0755 root root -
C+ /etc/sddm.conf.d/99-obsidian-blue-theme.conf - - - - /usr/lib/sddm/sddm.conf.d/99-obsidian-blue-theme.conf
