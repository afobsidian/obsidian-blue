# Minimal Hyprland compositor config for the SDDM Wayland greeter.
monitor = , preferred, auto, auto

exec-once = /usr/libexec/obsidian-blue-sddm-display-setup

windowrulev2 = fullscreen, class:^(sddm-greeter.*)$
windowrulev2 = stayfocused, class:^(sddm-greeter.*)$

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
