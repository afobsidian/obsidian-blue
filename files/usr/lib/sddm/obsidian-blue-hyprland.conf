# Minimal Hyprland compositor config for the SDDM Wayland greeter.
monitor = , preferred, auto, auto

exec-once = /usr/libexec/obsidian-blue-sddm-display-setup

windowrule = match:class ^(sddm-greeter.*)$, fullscreen on
windowrule = match:class ^(sddm-greeter.*)$, stay_focused on

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}
